<!-- Chatbot Component -->
<div id="chatbot-container">
    <!-- Chat button -->
    <button
        id="chatbot-button"
        class="fixed bottom-5 right-5 bg-red-600 hover:bg-red-700 dark:bg-accent hover:dark:bg-accent-dark text-white w-14 h-14 rounded-full flex items-center justify-center shadow-lg transition-all z-50 scale-100 opacity-100"
        aria-label="Open chat"
    >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
    </button>
    
    <!-- Chat window -->
    <div 
        id="chatbot-window"
        class="fixed bottom-5 right-5 w-80 sm:w-96 h-[500px] max-h-[80vh] bg-white dark:bg-gray-900 rounded-lg shadow-xl flex flex-col overflow-hidden z-50 transition-all duration-300 opacity-0 scale-95 pointer-events-none"
    >
        <!-- Header -->
        <div class="bg-red-600 dark:bg-accent text-white p-4 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-white dark:bg-gray-900 rounded-full flex items-center justify-center">
                    <span class="text-red-600 dark:text-accent font-bold text-xl">E</span>
                </div>
                <h3 class="font-semibold">E-click Support</h3>
            </div>
            <div class="flex items-center gap-2">
                <button 
                    id="chatbot-close"
                    class="text-white hover:text-red-200"
                    aria-label="Close chat"
                >
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- Messages -->
        <div id="chatbot-messages" class="flex-1 overflow-y-auto p-3 bg-gray-50 dark:bg-gray-800">
            <div class="mb-2 flex justify-start">
                <div class="max-w-[80%] rounded-lg p-2.5 bg-white dark:bg-gray-700 border border-gray-200 dark:border-gray-600 text-gray-800 dark:text-gray-100">
                    <p class="text-sm leading-snug">👋 Hello! I'm E-click's virtual assistant. How can I help you today?</p>
                    <p class="text-xs mt-0.5 opacity-70" id="initial-timestamp"></p>
                </div>
            </div>
        </div>
        
        <!-- Input area -->
        <form id="chatbot-form" class="border-t border-gray-200 dark:border-gray-700 p-3 flex">
            <input
                id="chatbot-input"
                type="text"
                placeholder="Type your message..."
                class="flex-1 bg-white dark:bg-gray-700 border border-red-200 dark:border-gray-600 text-gray-800 dark:text-white placeholder-gray-400 rounded-l-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500 dark:focus:ring-accent"
            />
            <button 
                type="submit"
                class="bg-red-600 hover:bg-red-700 dark:bg-accent hover:dark:bg-accent-dark text-white px-4 py-2 rounded-r-md transition-colors"
                disabled
            >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                </svg>
            </button>
        </form>
    </div>
</div>
