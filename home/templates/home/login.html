<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - E-click Technologies</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/login.css">
    
    <!-- Favicon -->
    <link rel="icon" href="/static/images/E%20Click%20Logo%20(1).png">
    
    <!-- Meta tags -->
    <meta name="description" content="Login to E-click Technologies dashboard. Access your projects, tasks, and management tools.">
    <meta name="keywords" content="login, dashboard, E-click Technologies, project management">
    <meta name="author" content="E-click Technologies">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Logo -->
            <a href="{% url 'home' %}" class="logo">
                <img src="/static/images/E%20Click%20Logo%20(1).png" alt="E-Click Logo">
                <img src="/static/images/E%20Click%20Logo%20(2).png" alt="E-Click Logo">
            </a>
            
            <!-- Desktop Navigation -->
            <div class="nav-links">
                <a href="{% url 'home' %}" class="nav-link">Home</a>
                <a href="{% url 'home' %}#services" class="nav-link">Services</a>
                <a href="{% url 'home' %}#solutions" class="nav-link">Solutions</a>
                <a href="{% url 'home' %}#clients" class="nav-link">Clients</a>
                <a href="{% url 'home' %}#contact" class="nav-link">Contact</a>
            </div>
            
            <!-- Auth Buttons -->
            <div class="auth-buttons">
                <a href="{% url 'login' %}" class="auth-btn login">Log in</a>
                <a href="/signup/" class="auth-btn signup">Sign up</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Login Section -->
        <section class="login-section">
            <!-- Animated Background -->
            <div class="animated-bg"></div>

            <div class="container">
                <div class="login-container">
                    
                    <!-- Login Form Container -->
                    <div class="login-form-container">
                        <!-- Company Logo -->
                        <div class="logo-section">
                            <div class="logo-wrapper">
                                <img src="/static/images/E%20Click%20Logo%20(1).png" alt="E-Click Logo">
                                <img src="/static/images/E%20Click%20Logo%20(2).png" alt="E-Click Logo">
                                <div class="logo-glow"></div>
                            </div>
                        </div>
                        
                        <!-- Login Header -->
                        <div class="login-header">
                            <h1 class="login-title">Welcome Back</h1>
                            <p class="login-subtitle">Login to access your dashboard</p>
                        </div>
                        
                        <!-- Messages -->
                        {% if messages %}
                        <div class="messages">
                            {% for message in messages %}
                            <div class="message">
                                {{ message }}
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}
                        
                        <!-- Login Form -->
                        <div class="login-form">
                            <form method="post" action="{% url 'login' %}" id="loginForm">
                                
                                <!-- Username Field -->
                                <div class="form-group">
                                    <label for="username" class="form-label">Username</label>
                                    <div class="input-wrapper">
                                        <input 
                                            type="text" 
                                            id="username" 
                                            name="username" 
                                            required 
                                            autocomplete="username"
                                            class="form-input"
                                            placeholder="Enter your username"
                                        >
                                        <div class="input-icon">
                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Password Field -->
                                <div class="form-group">
                                    <label for="password" class="form-label">Password</label>
                                    <div class="input-wrapper">
                                        <input 
                                            type="password" 
                                            id="password" 
                                            name="password" 
                                            required 
                                            autocomplete="current-password"
                                            class="form-input"
                                            placeholder="Enter your password"
                                        >
                                        <div class="input-icon">
                                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                            </svg>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Submit Button -->
                                <button type="submit" id="submitBtn" class="submit-btn">
                                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                                    </svg>
                                    Sign In
                                </button>
                            </form>
                        </div>
                        
                        <!-- Back to Home Link -->
                        <div class="back-link">
                            <a href="{% url 'home' %}">
                                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                                </svg>
                                Back to Home
                            </a>
                        </div>
                        
                        <!-- Additional Info -->
                        <div class="additional-info">
                            <p>
                                Don't have an account? 
                                <a href="/signup/">Sign up here</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JavaScript -->
    <script>
        // Check for saved dark mode preference or default to system preference
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }

        // Enhanced form interactions
        document.addEventListener('DOMContentLoaded', function() {
            const form = document.getElementById('loginForm');
            const submitBtn = document.getElementById('submitBtn');
            const inputs = document.querySelectorAll('input');

            // Add loading state to submit button
            form.addEventListener('submit', function(e) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = `
                    <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Signing In...
                `;
            });

            // Enhanced input focus effects
            inputs.forEach(input => {
                input.addEventListener('focus', function() {
                    this.parentElement.style.transform = 'translateY(-2px)';
                });

                input.addEventListener('blur', function() {
                    this.parentElement.style.transform = 'translateY(0)';
                    
                    // Validation feedback
                    if (this.required && !this.value.trim()) {
                        this.classList.add('error');
                    } else if (this.value.trim()) {
                        this.classList.add('success');
                    }
                });

                input.addEventListener('input', function() {
                    // Reset border color on input
                    this.classList.remove('error', 'success');
                });
            });

            // Keyboard navigation enhancement
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                    const inputs = Array.from(document.querySelectorAll('input'));
                    const currentIndex = inputs.indexOf(e.target);
                    
                    if (currentIndex < inputs.length - 1) {
                        e.preventDefault();
                        inputs[currentIndex + 1].focus();
                    }
                }
            });

            // Form validation enhancement
            form.addEventListener('submit', function(e) {
                let isValid = true;
                
                inputs.forEach(input => {
                    if (input.required && !input.value.trim()) {
                        input.classList.add('error');
                        isValid = false;
                    }
                });

                if (!isValid) {
                    e.preventDefault();
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = `
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path>
                        </svg>
                        Sign In
                    `;
                }
            });

            // Reveal animations
            const revealElements = document.querySelectorAll('.logo-section, .login-header, .messages, .login-form, .back-link, .additional-info');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                    }
                });
            });

            revealElements.forEach(element => {
                observer.observe(element);
            });

            // Enhanced accessibility
            inputs.forEach(input => {
                input.setAttribute('aria-describedby', input.id + '-help');
            });

            // Password visibility toggle (double-click to temporarily show)
            const passwordInput = document.getElementById('password');
            passwordInput.addEventListener('dblclick', function() {
                if (this.type === 'password') {
                    this.type = 'text';
                    setTimeout(() => {
                        this.type = 'password';
                    }, 1000);
                }
            });
        });
    </script>

</body>
</html>
